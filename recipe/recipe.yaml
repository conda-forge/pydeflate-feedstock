schema_version: 1

context:
  python_min: 3.11
  version: "2.3.5"

package:
  name: pydeflate
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pydeflate/pydeflate-${{ version }}.tar.gz
  sha256: 2e8d462f0fdfafde7e8640eb8f19d211ff96a4e52a2a3727963c6b762738b8f3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - uv-build >=0.9.15,<0.10
    - pip
  run:
    - python >=${{ python_min }}
    - hdx-python-country >=3.9.8
    - imf-reader >=1.4.1
    - oda-reader >=1.3.0
    - pandas >=2.0,<3.0
    - pandera >=0.20.0
    - pyarrow >=14.0
    - requests >=2.32.5
    - wbgapi >=1.0.12
    - platformdirs >=3.0.0
    - filelock >=3.15.0

tests:
  - python:
      imports:
        - pydeflate
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: Package to convert current prices figures to constant prices and vice versa
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/jm-rivera/pydeflate

extra:
  recipe-maintainers:
    - brynpickering
